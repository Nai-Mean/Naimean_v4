<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naimean Den v4</title>

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- ------------------------------------------------------
         LOGIN SCREEN
    ------------------------------------------------------ -->
    <div id="login-screen">
        <div id="login-box">
            <h1>Enter the Den</h1>
            <input id="login-input" type="password" placeholder="Password">
            <button id="login-btn">Unlock</button>
        </div>
    </div>

    <!-- ------------------------------------------------------
         MAIN DEN CONTAINER
    ------------------------------------------------------ -->
    <div id="den-container" class="active">

        <!-- LEFT MONITOR -->
        <div id="left-monitor" class="monitor">
            <div id="left-monitor-content">
                    <iframe
                        id="left-monitor-iframe"
                        src="https://www.madmedia.com"
                        title="Mad Media"
                        frameborder="0"
                        allowfullscreen
                        style="width:100%;height:100%;border:none;"
                    ></iframe>
                </div>
        </div>

        <!-- BIG TV (DVD BOUNCE) -->
        <div id="big-tv" class="monitor">
            <img id="dvd-logo" src="assets/img/dvd-logo.svg" alt="DVD Logo">
        </div>

        <!-- RIGHT MONITOR (AQUARIUM) -->
        <canvas id="right-monitor" class="monitor"></canvas>

        <!-- COMMODORE MONITOR -->
        <div id="commodore" class="monitor">
            <div id="commodore-screen">
                <!-- Future retro terminal -->
            </div>
        </div>

        <!-- ------------------------------------------------------
             PROMPT TERMINAL
        ------------------------------------------------------ -->
        <div id="prompt-container">
            <div id="prompt-output"></div>
            <input id="prompt-input" type="text" autocomplete="off">
        </div>

        <!-- ------------------------------------------------------
             TOOLS PANEL
        ------------------------------------------------------ -->
        <div id="tools-panel">
            <button id="tools-close">×</button>
            <div id="tools-content">
                <h2>Tools</h2>
                <p>More coming soon...</p>
            </div>
        </div>

        <button id="tools-toggle">TOOLS</button>

        <!-- ------------------------------------------------------
             HOTSPOTS
        ------------------------------------------------------ -->
        <div id="hotspot-tools" class="hotspot"></div>
        <div id="hotspot-prompt" class="hotspot"></div>
        <div id="hotspot-login" class="hotspot"></div>
        <div id="hotspot-left-monitor" class="hotspot"></div>
        <div id="hotspot-right-monitor" class="hotspot"></div>

        <!-- ------------------------------------------------------
             PERFORMANCE PANEL
        ------------------------------------------------------ -->
        <div id="performance-panel">
            <div>FPS: <span id="perf-fps">0</span></div>
            <div>CPU: <span id="perf-cpu">0%</span></div>
            <div>MEM: <span id="perf-mem">0 MB</span></div>
        </div>

    </div>

    <!-- ------------------------------------------------------
         SYSTEM READY INDICATOR (#5)
    ------------------------------------------------------ -->
    <div id="system-ready"
         style="
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 4px 8px;
            background: rgba(0, 255, 0, 0.15);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #0f0;
            border-radius: 4px;
            opacity: 0.7;
            pointer-events: none;
         ">
        BOOTING…
    </div>

    <!-- ------------------------------------------------------
         BOOT BANNER (ADDED HERE)
    ------------------------------------------------------ -->
    <script src="assets/js/bootBanner.js"></script>

    <!-- ------------------------------------------------------
         MAIN SCRIPT ENTRY
    ------------------------------------------------------ -->
    <script type="module" src="assets/js/index.js"></script>

</body>
</html>
